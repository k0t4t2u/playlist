<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コタツ</title>
  <meta name="theme-color" content="#0b0b0d" />
  <meta property="og:title" content="コタツ プレイリスト" />
  <meta property="og:image" content="https://i.imgur.com/Z9ChDtn.png" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========================================================
       상단 슬림 플레이어 바 (유튜브 재생목록 / 곡 목록 재생)
       오른쪽 끝: 재생목록 · 방명록 · 페이지 관리
       ========================================================= -->
  <div class="player-bar" id="playerBar" role="region" aria-label="음악 플레이어">
    <div class="pb-line"><span id="pbLineFill"></span></div>

    <button class="pb-now" id="pbNow" title="재생 중인 곡으로 이동">
      <span class="pb-art">
        <img id="pbArt" alt="" />
        <span class="pb-eq" aria-hidden="true"><i></i><i></i><i></i></span>
      </span>
      <span class="pb-meta">
        <span class="pb-title" id="pbTitle">불러오는 중…</span>
        <span class="pb-artist" id="pbArtist"></span>
      </span>
    </button>

    <div class="pb-controls">
      <button class="icon-btn pb-shuffle" id="pbShuffle" aria-label="셔플"></button>
      <button class="icon-btn" id="pbPrev" aria-label="이전 곡"></button>
      <button class="icon-btn pb-play" id="pbPlay" aria-label="재생"></button>
      <button class="icon-btn" id="pbNext" aria-label="다음 곡"></button>
      <button class="icon-btn pb-repeat" id="pbRepeat" aria-label="반복"></button>
    </div>

    <div class="pb-seek">
      <span class="pb-time" id="pbCur">0:00</span>
      <div class="pb-progress" id="pbProgress" role="slider" tabindex="0"
           aria-label="재생 위치" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="pb-progress-fill" id="pbFill"></div>
      </div>
      <span class="pb-time" id="pbDur">0:00</span>
    </div>

    <div class="pb-tools">
      <div class="pb-vol">
        <button class="icon-btn" id="pbMute" aria-label="음소거"></button>
        <input type="range" class="pb-volume" id="pbVolume" min="0" max="100" value="80" aria-label="볼륨" />
      </div>
      <button class="icon-btn pb-video" id="pbVideo" aria-label="영상 보기"></button>

      <span class="pb-div" aria-hidden="true"></span>

      <button class="icon-btn" id="pbQueue" aria-label="재생 목록" aria-expanded="false" title="재생 목록"></button>
      <button class="icon-btn pb-badge" id="pbGuest" aria-label="방명록" title="방명록"></button>
      <a class="icon-btn" id="pbAdmin" href="admin.html" aria-label="페이지 관리" title="페이지 관리"></a>
    </div>
  </div>

  <!-- 재생 목록 패널 -->
  <div class="queue-panel glass" id="queuePanel" hidden>
    <div class="qp-head">
      <span>재생 목록</span>
      <span class="count" id="qpCount"></span>
    </div>
    <div class="qp-list" id="qpList"></div>
  </div>

  <!-- config.js 미설정 시 안내 -->
  <div class="setup-banner" id="setupBanner" hidden>
    ⚙️ <strong>설정이 필요합니다.</strong>
    <code>config.js</code> 파일을 열어 본인 Supabase 프로젝트의 URL과 anon 키를 넣어주세요.
    자세한 방법은 <code>README.md</code> 참고.
  </div>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="site-id">
      <h1 class="site-title" id="siteTitle">コタツ</h1>
      <p class="site-subtitle hidden" id="siteSubtitle"></p>
    </div>
    <div class="header-actions">
      <button class="btn" id="collapseAllBtn">
        <span class="ico" aria-hidden="true"></span><span class="label">전체 접기</span>
      </button>
    </div>
  </header>

  <!-- 플레이리스트 -->
  <main class="container">
    <div class="playlist-container" id="playlist">
      <div class="empty-state">불러오는 중…</div>
    </div>
  </main>

  <!-- 방명록 모달 -->
  <div class="modal-overlay" id="gbModal" hidden>
    <div class="modal glass" role="dialog" aria-modal="true" aria-labelledby="gbHeading">
      <div class="modal-head">
        <h3 id="gbHeading">방명록 <span class="count" id="gbCount"></span></h3>
        <button class="icon-btn" id="gbClose" aria-label="닫기"></button>
      </div>
      <div class="gb-list" id="gbList"></div>
      <form class="gb-form" id="gbForm">
        <div class="gb-form-row">
          <input type="text" id="gbName" placeholder="이름" maxlength="40" required style="max-width:160px" autocomplete="nickname" />
        </div>
        <textarea id="gbMsg" placeholder="메시지를 남겨주세요 (Ctrl+Enter로 등록)" maxlength="500" rows="2" required></textarea>
        <div class="gb-form-foot">
          <span class="gb-counter" id="gbCounter">0 / 500</span>
          <button type="submit" class="btn btn-accent">남기기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- YouTube 오디오/영상 호스트 (기본 화면 밖, 영상 보기 시 표시) -->
  <div class="yt-host" id="ytHost"><div id="yt-mount"></div></div>

  <!-- Supabase + 설정 + 앱 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
